<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="icon" href="{{ '/icon.png' | relative_url }}" type="image/png">
  <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}">
  {% feed_meta %}
</head>
<body data-page-layout="{{ page.layout }}">
  <div class="page">
    <header class="topbar">
      <a class="brand" href="{{ '/' | relative_url }}">
        <img class="brand-mark" src="{{ '/icon.png' | relative_url }}" alt="" width="128" height="128">
        <span>{{ site.title }}</span>
      </a>
      <div class="topbar-right">
        <nav class="nav" aria-label="Main navigation">
          <a class="nav-link{% if page.url == '/' %} is-current{% endif %}" data-nav-link="home" href="{{ '/#home' | relative_url }}">Home</a>
          <a class="nav-link{% if page.layout == 'post' %} is-current{% endif %}" data-nav-link="blog" href="{{ '/#blog' | relative_url }}">Blog</a>
        </nav>
        <button class="toggle-button" id="theme-toggle" type="button">Dark mode</button>
      </div>
    </header>

    <main>
      {{ content }}
    </main>

    <footer class="site-footer">
      <p>"Mason's blog thing"</p>
      <ul class="social-links footer-social-links" aria-label="Social accounts">
        <li><a href="https://www.youtube.com/@Mason_Lee_101" target="_blank" rel="noopener noreferrer">YouTube</a></li>
        <li><a href="https://x.com/Mason_Lee_101" target="_blank" rel="noopener noreferrer">X</a></li>
        <li><a href="https://github.com/Mason-lee-101" target="_blank" rel="noopener noreferrer">GitHub</a></li>
        <li><a href="https://www.linkedin.com/in/mason-lee-101-/" target="_blank" rel="noopener noreferrer">LinkedIn</a></li>
        <li><a href="https://www.instagram.com/mason_lee.101/" target="_blank" rel="noopener noreferrer">Instagram</a></li>
        <li><a href="https://www.twitch.tv/mason_lee_101" target="_blank" rel="noopener noreferrer">Twitch</a></li>
        <li><a href="{{ '/feed.xml' | relative_url }}">RSS</a></li>
      </ul>
    </footer>
  </div>

  <script src="{{ '/app.js' | relative_url }}"></script>
</body>
</html>
